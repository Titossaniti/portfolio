<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/bootsrap/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Contactez-moi</title>
</head>
<body>
    <nav class="container py-3">
        <div class="row fs-3">
                <div class="col-6 text-start slide-in-right">
                    <a href="../index.html">Tristan Erard</a>
                </div>
                <div class="col-6 text-end slide-in-right">
                    <a href="#"><span class="underline">Contactez-moi !</span></a>
                </div>
        </div>
    </nav>
    <main class="fade-in-fwd">
        <div class="container">
            <div class="my-5 fs-4 contact">
                Si vous souhaitez me contacter :
            </div>
            <form action="https://api.staticforms.xyz/submit" method="post">
                <input type="hidden" name="accessKey" value="e87accda-8a80-46b8-a878-f55f8ef4ff87">
    
                <div class="d-flex justify-content-between">
                    <input type="text" name="name" id="name" placeholder="Nom" class="formstyle d-block col-6">
                    <input type="text" name="$prenom" id="prenom" placeholder="Prénom" class="formstyle d-block col-5">
                </div>
    
                <input type="text" name="honeypot" style="display: none;">

                <label for="email"></label>
                <input type="email" name="email" id="email" placeholder="Adresse mail" class="d-block formstyle col-12">

                <textarea name="message" class="formstyle mt-4 pt-3 col-12" placeholder="Ecrivez-moi !"></textarea>
    
                <input type="hidden" name="redirectTo" value="http://127.0.0.1:5500/Portfolio/index.html">
                <div class="text-end">
                    <input type="submit" value="Envoyer" class="mt-5 btn btn-light px-5 fw-bold"/>
                </div>
            </form>
        </div>
    </main>
    <footer class="container pt-5">
        <div class="row pt-4 slide-in-right">
            <div class="col-6">
                Copyright &copy; Tristan Erard - <span id="date"></span>
            </div>
            <div class="col-6 text-end">
                <a href="pages/moreinfo.html" class="underline">
                    En savoir plus sur ce site
                </a>
            </div>
        </div>
    </footer>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.3/jquery.min.js" integrity="sha512-STof4xm1wgkfm7heWqFJVn58Hm3EtS31XFaagaa8VMReCXAkQnJZ+jEy8PCC/iT18dFy95WcExNHFTqLyp72eQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="../assets/main.js"></script>
    <script src="../assets/bootsrap/bootstrap.bundle.min.js"></script>
</body>
</html>
